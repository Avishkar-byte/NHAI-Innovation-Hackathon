services:
  - type: web
    name: datalake3-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: datalake3-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: datalake3-db
    plan: free
    databaseName: datalake3
    user: datalake_admin
